<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="photo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Printer body -->
  <rect x="5" y="13" width="22" height="12" rx="2" fill="white" opacity="0.95"/>
  <!-- Top paper slot -->
  <rect x="9" y="8" width="14" height="7" rx="1.5" fill="white" opacity="0.8"/>
  <!-- Photo output -->
  <rect x="10" y="19" width="12" height="10" rx="1" fill="url(#photo)"/>
  <!-- Dot indicator -->
  <circle cx="23" cy="17" r="1.5" fill="#a855f7"/>
</svg>