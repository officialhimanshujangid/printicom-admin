<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="photo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="url(#shine)"/>

  <!-- Printer body -->
  <rect x="44" y="85" width="112" height="58" rx="10" ry="10" fill="white" opacity="0.95"/>
  <!-- Printer top slot -->
  <rect x="60" y="65" width="80" height="28" rx="6" ry="6" fill="white" opacity="0.8"/>
  <!-- Printer dark band -->
  <rect x="44" y="100" width="112" height="14" rx="0" fill="white" opacity="0.15"/>

  <!-- Paper / Photo coming out -->
  <rect x="68" y="108" width="64" height="50" rx="4" ry="4" fill="url(#photo)"/>
  <!-- Photo highlights -->
  <rect x="68" y="108" width="64" height="18" rx="4" ry="4" fill="#fbbf24"/>
  <!-- Little image icon on photo -->
  <circle cx="84" cy="124" r="6" fill="white" opacity="0.5"/>
  <polygon points="78,136 90,118 96,128 104,118 120,136" fill="white" opacity="0.4"/>

  <!-- Printer button dots -->
  <circle cx="136" cy="111" r="4" fill="#6366f1"/>
  <circle cx="149" cy="111" r="4" fill="#a855f7"/>

  <!-- Paper input slot -->
  <rect x="62" y="69" width="76" height="4" rx="2" fill="white" opacity="0.5"/>
</svg>
